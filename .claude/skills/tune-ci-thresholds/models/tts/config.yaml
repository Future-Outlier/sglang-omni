# Model-specific config for the TTS CI threshold skill.
#
# Notes:
# - ASR CI is calibrated separately via `--model asr`.
#   This model owns the TTS generation and serving threshold tests.
# - test_tts_ci.py runs the model-dependent TTS stages (nonstream / stream)
#   controlled by --tts-stage in CI. Calibration does not use CI's random
#   model pick. It expands every calibration_preset below and runs the full
#   test file once per preset per repeat.
# - CI random-pick coverage and calibration coverage are intentionally
#   different: CI samples one TTS model per commit; calibration must run every
#   TTS model preset and compute worst-of-N for each.
# Fixed CI presets in test_tts_ci.py / tts_ci_config.py — NEVER written by
# apply except the explicit threshold literals in tts_ci_config.py:
#   SEEDTTS_EN_FULLSET_SAMPLES
#   TTS_SIMILARITY_MAX_SAMPLES
#   STREAMING_BENCHMARK_MAX_SAMPLES = None  (full SeedTTS EN set for streaming)
# - Voice-clone artifacts live under per-variant dirs in pytest tmp_path:
#   vc_nonstream_c16/ and vc_stream_c16/ (speed_results.json, wer_results.json,
#   similarity_results.json and utmos_results.json for nonstream).
# - WER thresholds are corpus-level only; each TTS preset has its own symbol
#   namespace in tts_ci_config.py (Higgs: HIGGS_VC_* / _HIGGS_VC_*; MOSS:
#   MOSS_VC_* / _MOSS_VC_*). Per-sample WER caps and generation failure
#   budgets are not calibrated.
# - Stage 3 (streaming consistency) has no numeric threshold in tune.py; see
#   SKILL.md § TTS stage 3.
# - Concurrency: TTS generation CI uses --concurrency 16 for every preset.
#   Qwen3-ASR router/transcribe fan-out for WER uses 32 at DP=2.
# - GPU topology is per preset. Higgs and MOSS each need 2 GPUs total
#   (2 router workers × 1 complete single-GPU server). MOSS Local's default
#   pipeline config is colocated, so codec/vocoder stay on each worker's cuda:0.
# - Venv: CI uses omni under OMNI_CI_HOME (see omni_ci_home below).
# - Auth: export HF_TOKEN before precheck/run unless the private TTS model
#   weights are already present in the configured HF cache.
name: tts
description: "TTS CI (Higgs/MOSS SeedTTS EN)"
hf_model_id: "bosonai/higgs-tts-3-4b"
hf_model_ids_by_test:
  test_tts_ci.py:
    - "bosonai/higgs-tts-3-4b"
    - "OpenMOSS-Team/MOSS-TTS-Local-Transformer-v1.5"
    - "Qwen/Qwen3-ASR-1.7B"
  test_tts_serving_ci.py:
    - "bosonai/higgs-tts-3-4b"
hf_datasets:
  - "zhaochenyang20/seed-tts-eval-arrow"
hf_datasets_by_test:
  test_tts_ci.py:
    - "zhaochenyang20/seed-tts-eval-arrow"
  test_tts_serving_ci.py: []
requires_speaker_sim_by_test:
  test_tts_ci.py: true
  test_tts_serving_ci.py: false
omni_ci_home: "/github/home/calibration"
default_venv_python:
  # H100 CI calibration venv (first match wins).
  - "/github/home/calibration/omni/bin/python"
  - "/sgl-workspace/sglang-omni/omni/bin/python"
  - "/github/home/omni/bin/python"
auto_env:
  HOME: "/github/home"
  OMNI_CI_HOME: "/github/home/calibration"
  HF_HOME: "/github/home/.cache/huggingface"
  XDG_CACHE_HOME: "/github/home/calibration/.cache"
  HF_ENDPOINT: "https://huggingface.co"
  HF_HUB_DISABLE_XET: "0"
  UV_INDEX_URL: "https://mirrors.aliyun.com/pypi/simple"
  UV_CACHE_DIR: "/github/home/.cache/uv"
  TORCHINDUCTOR_CACHE_DIR: "/github/home/calibration/.torchinductor"
  FLASHINFER_DISABLE_VERSION_CHECK: "1"
  SEEDTTS_SIM_CACHE_DIR: "/github/home/seedtts-wavlm-sim"
gpus_per_test:
  test_tts_ci.py: 2
  test_tts_serving_ci.py: 1
test_globs:
  - "tests/test_model/test_tts_ci.py"
  - "tests/test_model/test_tts_serving_ci.py"
extra_env: {}
pytest_extra_args:
  test_tts_ci.py:
    - "--concurrency"
    - "16"
stage_base_strip_prefix: "test_"
stage_base_strip_suffix: "_ci"
stage_base_docs_override: "tts_docs"
metric_sources:
  test_tts_ci.py:
    threshold_file: "tests/test_model/tts_ci_config.py"
    calibration_presets:
      higgs:
        extra_env:
          TTS_CI_MODEL: "higgs"
        gpus: 2
        # discover: only Higgs HIGGS_VC_* constants (never MOSS_VC_*)
        constant_filter: "^HIGGS_VC_"
        hf_model_ids:
          - "bosonai/higgs-tts-3-4b"
          - "Qwen/Qwen3-ASR-1.7B"
      moss:
        extra_env:
          TTS_CI_MODEL: "moss"
        gpus: 2
        # discover: only MOSS_VC_* constants (never HIGGS_VC_*)
        constant_filter: "^MOSS_VC_"
        hf_model_ids:
          - "OpenMOSS-Team/MOSS-TTS-Local-Transformer-v1.5"
          - "Qwen/Qwen3-ASR-1.7B"
    # Per-variant routing: each variant claims constants matching its
    # `constant_filter` regex (matched against the bare constant name with
    # any leading underscore stripped). Stage keys become
    # <base>_<variant>_<group>: e.g. tts_nonstream_speed, tts_stream_wer,
    # tts_nonstream_similarity.
    variants:
      nonstream:
        # Higgs HIGGS_VC_* (not HIGGS_VC_STREAM_*); MOSS uses MOSS_VC_*.
        # via calibration_presets.<preset>.constant_filter in discover.
        constant_filter: "^HIGGS_VC_(?!STREAM_).*|^MOSS_VC_(?!STREAM_).*"
        json_file: "test_voice_cloning_non_streami0/vc_nonstream_c16/speed_results.json"
        sample_counts:
          total: "summary.total_requests"
          ok: "summary.completed_requests"
        sample_counts_by_group:
          wer:
            total: "test_voice_cloning_non_streami0/vc_nonstream_c16/wer_results.json::summary.total_samples"
            ok: "test_voice_cloning_non_streami0/vc_nonstream_c16/wer_results.json::summary.evaluated"
          similarity:
            total: "test_voice_cloning_non_streami0/vc_nonstream_c16/similarity_results.json::summary.total_samples"
            ok: "test_voice_cloning_non_streami0/vc_nonstream_c16/similarity_results.json::summary.evaluated"
          utmos:
            total: "test_voice_cloning_non_streami0/vc_nonstream_c16/utmos_results.json::summary.total_samples"
            ok: "test_voice_cloning_non_streami0/vc_nonstream_c16/utmos_results.json::summary.evaluated"
        paths:
          throughput_qps: "summary.throughput_qps"
          output_tok_per_req_s: "summary.output_tok_per_req_s"
          latency_mean_s: "summary.latency_mean_s"
          rtf_mean: "summary.rtf_mean"
          corpus_wer: "test_voice_cloning_non_streami0/vc_nonstream_c16/wer_results.json::summary.wer_corpus"
          similarity_mean: "test_voice_cloning_non_streami0/vc_nonstream_c16/similarity_results.json::summary.speaker_similarity_mean"
          utmos_mean: "test_voice_cloning_non_streami0/vc_nonstream_c16/utmos_results.json::summary.utmos_mean"
      stream:
        constant_filter: "^HIGGS_VC_STREAM_.*$|^MOSS_VC_STREAM_.*$"
        json_file: "test_voice_cloning_streaming0/vc_stream_c16/speed_results.json"
        sample_counts:
          total: "summary.total_requests"
          ok: "summary.completed_requests"
        sample_counts_by_group:
          wer:
            total: "test_voice_cloning_streaming0/vc_stream_c16/wer_results.json::summary.total_samples"
            ok: "test_voice_cloning_streaming0/vc_stream_c16/wer_results.json::summary.evaluated"
        paths:
          throughput_qps: "summary.throughput_qps"
          output_tok_per_req_s: "summary.output_tok_per_req_s"
          latency_mean_s: "summary.latency_mean_s"
          rtf_mean: "summary.rtf_mean"
          corpus_wer: "test_voice_cloning_streaming0/vc_stream_c16/wer_results.json::summary.wer_corpus"
  test_tts_serving_ci.py:
    observation_validity: "tts-serving-ci0/benchmark_validation.json::valid"
    allowed_pytest_failure: "tts-serving-ci0/benchmark_validation.json::threshold_assertion_failed"
    variants:
      closed16:
        constant_filter: "^SERVING_CLOSED16_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage.closed-16.successful_request_count"
          ok: "metrics.by_stage.closed-16.metric_sample_counts.latency_s"
        paths:
          throughput_qps: "metrics.by_stage.closed-16.achieved_rps"
          latency_p95_s: "metrics.by_stage.closed-16.latency_s.p95"
      ramp:
        constant_filter: "^SERVING_RAMP_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage.ramp-128.successful_request_count"
          ok: "metrics.by_stage.ramp-128.metric_sample_counts.latency_s"
        paths:
          throughput_qps: "metrics.by_stage.ramp-128.achieved_rps"
          latency_p95_s: "metrics.by_stage.ramp-128.latency_s.p95"
      soak:
        constant_filter: "^SERVING_SOAK_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage.soak-300s.successful_request_count"
          ok: "metrics.by_stage.soak-300s.metric_sample_counts.latency_s"
        paths:
          latency_p95_s: "metrics.by_stage.soak-300s.latency_s.p95"
      speech_normal:
        constant_filter: "^SERVING_SPEECH_NORMAL_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage_and_workload.soak-300s.speech_normal.successful_request_count"
          ok: "metrics.by_stage_and_workload.soak-300s.speech_normal.metric_sample_counts.rtf"
        paths:
          latency_p95_s: "metrics.by_stage_and_workload.soak-300s.speech_normal.latency_s.p95"
          rtf_p95: "metrics.by_stage_and_workload.soak-300s.speech_normal.rtf.p95"
      rest_stream:
        constant_filter: "^SERVING_REST_STREAM_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage_and_workload.soak-300s.rest_stream.successful_request_count"
          ok: "metrics.by_stage_and_workload.soak-300s.rest_stream.metric_sample_counts.inter_chunk_s"
        paths:
          ttfa_p95_s: "metrics.by_stage_and_workload.soak-300s.rest_stream.ttfa_s.p95"
          inter_chunk_p95_s: "metrics.by_stage_and_workload.soak-300s.rest_stream.inter_chunk_s.p95"
          latency_p95_s: "metrics.by_stage_and_workload.soak-300s.rest_stream.latency_s.p95"
          rtf_p95: "metrics.by_stage_and_workload.soak-300s.rest_stream.rtf.p95"
      batch32:
        constant_filter: "^SERVING_BATCH32_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage_and_workload.soak-300s.batch_32_all_valid.successful_request_count"
          ok: "metrics.by_stage_and_workload.soak-300s.batch_32_all_valid.metric_sample_counts.latency_s"
        paths:
          latency_p95_s: "metrics.by_stage_and_workload.soak-300s.batch_32_all_valid.latency_s.p95"
      ws_normal:
        constant_filter: "^SERVING_WS_NORMAL_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage_and_workload.ws-burst-512.ws_normal.successful_request_count"
          ok: "metrics.by_stage_and_workload.ws-burst-512.ws_normal.metric_sample_counts.ttfa_s"
        paths:
          ttfa_p95_s: "metrics.by_stage_and_workload.ws-burst-512.ws_normal.ttfa_s.p95"
          latency_p95_s: "metrics.by_stage_and_workload.ws-burst-512.ws_normal.latency_s.p95"
      ws_stream:
        constant_filter: "^SERVING_WS_STREAM_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage_and_workload.ws-burst-512.ws_stream_audio.successful_request_count"
          ok: "metrics.by_stage_and_workload.ws-burst-512.ws_stream_audio.metric_sample_counts.inter_chunk_s"
        paths:
          ttfa_p95_s: "metrics.by_stage_and_workload.ws-burst-512.ws_stream_audio.ttfa_s.p95"
          inter_chunk_p95_s: "metrics.by_stage_and_workload.ws-burst-512.ws_stream_audio.inter_chunk_s.p95"
          latency_p95_s: "metrics.by_stage_and_workload.ws-burst-512.ws_stream_audio.latency_s.p95"
          rtf_p95: "metrics.by_stage_and_workload.ws-burst-512.ws_stream_audio.rtf.p95"
      mixed_burst:
        constant_filter: "^SERVING_MIXED_BURST_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage.mixed-burst-512.successful_request_count"
          ok: "metrics.by_stage.mixed-burst-512.metric_sample_counts.latency_s"
        paths:
          throughput_qps: "metrics.by_stage.mixed-burst-512.achieved_rps"
          latency_p95_s: "metrics.by_stage.mixed-burst-512.latency_s.p95"
      long:
        constant_filter: "^SERVING_LONG_(?!BASELINE_)"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_workload.long_prefill_decode.successful_request_count"
          ok: "metrics.by_workload.long_prefill_decode.metric_sample_counts.generation_metrics_complete"
        paths:
          prompt_tokens_min: "metrics.by_workload.long_prefill_decode.prompt_tokens.min"
          completion_tokens_min: "metrics.by_workload.long_prefill_decode.completion_tokens.min"
          latency_p95_s: "metrics.by_workload.long_prefill_decode.latency_s.p95"
          audio_duration_min_s: "metrics.by_workload.long_prefill_decode.audio_duration_s.min"
          output_tok_per_req_s: "metrics.by_workload.long_prefill_decode.output_tok_per_req_s"
      long_baseline:
        constant_filter: "^SERVING_LONG_BASELINE_"
        json_file: "tts-serving-ci0/benchmark/results.json"
        sample_counts:
          total: "metrics.by_stage_and_workload.closed-1.long_prefill_decode.successful_request_count"
          ok: "metrics.by_stage_and_workload.closed-1.long_prefill_decode.metric_sample_counts.generation_metrics_complete"
        paths:
          latency_max_s: "metrics.by_stage_and_workload.closed-1.long_prefill_decode.latency_s.max"
          output_tok_per_req_s: "metrics.by_stage_and_workload.closed-1.long_prefill_decode.output_tok_per_req_s"
